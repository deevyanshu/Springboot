server: 
    port: 8084

spring:
    application:
        name: API-GATEWAY

    cloud:
        gateway: 
            routes:
                - id: USER
                  uri: lb://USER
                  predicates:
                    - Path=/user/**

                - id: CONTACTS
                  uri: lb://CONTACTS
                  predicates:
                    - Path=/contacts/**
                

eureka:
    instance:
        prefer-ip-address: true
    client: 
        fetch-registry: true
        register-with-eureka: true
        service-url:
            defaultZone: http://localhost:8761/eureka